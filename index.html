<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

.dash-title {
  margin: 0 0 18px;
  font-size: 28px; font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

.tile {
  --accent: #FAFAFA;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  text-decoration: none;
  color: var(--text-primary);
  overflow: hidden;
  transition:
    transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.25s ease,
    box-shadow 0.25s ease;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 55%, transparent);
  box-shadow:
    0 16px 48px rgba(0,0,0,0.55),
    0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent);
}
.tile:hover .tile-arrow { transform: translateX(4px); }

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}

.tile-emoji {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 22px;
  line-height: 1;
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 65%, transparent));
}
.tile.big .tile-emoji { font-size: 30px; }

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--text-primary);
  line-height: 1.15;
}
.tile.big .tile-title { font-size: 24px; }

.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}
.tile-subtitle {
  font-size: 11.5px;
  color: var(--text-tertiary);
  letter-spacing: 0.01em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tile-arrow {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
  transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}

@media (max-width: 720px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .tile.big  { grid-column: span 2; grid-row: span 1; }
  .tile.wide { grid-column: span 2; }
}

@media (max-width: 440px) {
  .bento { grid-template-columns: 1fr; grid-auto-rows: 148px; gap: 12px; }
  .tile.big, .tile.wide { grid-column: span 1; }
  .tile.big { grid-row: span 1; }
  .tile { padding: 16px; }
  .tile-title { font-size: 17px; }
  .tile.big .tile-title { font-size: 20px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <nav class="bento" aria-label="Dashboard sections">

    <a class="tile big" href="main.html" style="--accent:#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-emoji" aria-hidden="true">🏠</span>
      <span class="tile-spacer"></span>
      <span class="tile-title">Main</span>
      <span class="tile-footer">
        <span class="tile-subtitle">Goals &amp; daily plan</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </span>
    </a>

    <a class="tile wide" href="gym.html" style="--accent:#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-emoji" aria-hidden="true">💪</span>
      <span class="tile-spacer"></span>
      <span class="tile-title">Fitness</span>
      <span class="tile-footer">
        <span class="tile-subtitle">Workouts, splits, sessions</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </span>
    </a>

    <a class="tile" href="health.html" style="--accent:#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-emoji" aria-hidden="true">💊</span>
      <span class="tile-spacer"></span>
      <span class="tile-title">Health</span>
      <span class="tile-footer">
        <span class="tile-subtitle">Supplements &amp; vitals</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </span>
    </a>

    <a class="tile" href="po-water.html" style="--accent:#60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-emoji" aria-hidden="true">💧</span>
      <span class="tile-spacer"></span>
      <span class="tile-title">Water</span>
      <span class="tile-footer">
        <span class="tile-subtitle">Hydration</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </span>
    </a>

    <a class="tile wide" href="finance.html" style="--accent:#F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-emoji" aria-hidden="true">📊</span>
      <span class="tile-spacer"></span>
      <span class="tile-title">Finance</span>
      <span class="tile-footer">
        <span class="tile-subtitle">Net worth &amp; spending</span>
        <span class="tile-arrow" aria-hidden="true">→</span>
      </span>
    </a>

  </nav>

</div>
</body>
</html>
